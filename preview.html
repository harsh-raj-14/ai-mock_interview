<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview - UI Preview</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Sleek black and neon-blue dark theme */
        :root {
            --bg-color: #050505;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(10, 15, 30, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background Orbs and Grid */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(0, 243, 255, 0.15);
            top: -50px;
            left: -50px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(0, 102, 255, 0.1);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(50px) scale(1.1);
            }
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--neon-blue);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s forwards ease-out;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.1);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .question-number {
            font-size: 0.8rem;
            color: var(--neon-blue);
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #fff;
        }

        /* Loading State */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 243, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .loading-text {
            color: var(--neon-blue);
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        /* Error State */
        .error-container {
            text-align: center;
            padding: 3rem;
            border-color: rgba(255, 50, 50, 0.3);
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ff3333;
        }

        .error-title {
            color: #ff3333;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .error-message {
            color: var(--text-muted);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            }

            50% {
                opacity: 0.5;
                text-shadow: none;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggered animations */
        .glass-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .glass-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .glass-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .glass-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .glass-card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .glass-card:nth-child(6) {
            animation-delay: 0.6s;
        }

        .glass-card:nth-child(7) {
            animation-delay: 0.7s;
        }

        .glass-card:nth-child(8) {
            animation-delay: 0.8s;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.6);
        }
    </style>
</head>

<body>
    <div class="background-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div id="root" class="app-container"></div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [questions, setQuestions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchQuestions = async () => {
                    setLoading(true);
                    setError(null);
                    try {
                        // Using AllOrigins CORS proxy to handle CORS issues gracefully
                        // The backend might not have django-cors-headers installed or it may take time to spin up
                        const response = await fetch(
                            "https://ai-mock-interview-2-y4q1.onrender.com/interview/api/questions/?role=Software%20Developer"
                        );

                        const data = await response.json();

                        if (data && data.questions) {
                            setQuestions(data.questions);
                        } else {
                            throw new Error("Invalid data");
                        }
                    } catch (err) {
                        console.error("Fetch error:", err);
                        setError("Failed to connect to the AI engine. Our servers might be waking up or experiencing issues.");
                    } finally {
                        setLoading(false);
                    }
                };

                // Run fetch on component load automatically
                fetchQuestions();
            }, []);

            return (
                <React.Fragment>
                    <div className="header">
                        <h1 className="title">AI Mock Interview</h1>
                        <h2 className="subtitle">LIVE PREVIEW TERMINAL</h2>
                    </div>

                    {loading && (
                        <div className="loading-container">
                            <div className="loader"></div>
                            <div className="loading-text">GENERATING QUESTIONS...</div>
                        </div>
                    )}

                    {error && (
                        <div className="glass-card error-container">
                            <div className="error-icon">⚠️</div>
                            <h3 className="error-title">Connection Error</h3>
                            <p className="error-message">{error}</p>
                            <button
                                onClick={() => window.location.reload()}
                                style={{
                                    marginTop: '1.5rem',
                                    padding: '10px 24px',
                                    background: 'transparent',
                                    border: '1px solid var(--neon-blue)',
                                    color: 'var(--neon-blue)',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontFamily: 'Outfit',
                                    fontWeight: '600'
                                }}
                                onMouseOver={(e) => { e.target.style.background = 'rgba(0, 243, 255, 0.1)'; }}
                                onMouseOut={(e) => { e.target.style.background = 'transparent'; }}
                            >
                                RETRY CONNECTION
                            </button>
                        </div>
                    )}

                    {!loading && !error && questions.length > 0 && (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            {questions.map((q, index) => (
                                <div key={index} className="glass-card">
                                    <div className="question-number">QUESTION {index + 1} // SOFTWARE DEVELOPER</div>
                                    <div className="question-text">{q}</div>
                                </div>
                            ))}
                        </div>
                    )}

                    {!loading && !error && questions.length === 0 && (
                        <div className="glass-card" style={{ textAlign: 'center', color: 'gray' }}>
                            No questions returned.
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
